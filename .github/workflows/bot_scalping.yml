# Plik: .github/workflows/scalping.yml
name: 🏃 SCALPING RADAR

on:
  schedule:
     - cron: '0 8,11,14,17,19 * * 1-5' # Godziny 10, 13,
  workflow_dispatch:

jobs:
  analiza:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # v4.0: ~20s zamiast 5min → limit skrócony

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalacja bibliotek
        run: pip install -r requirements.txt

      - name: 🤖 Uruchom bota
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/bot_do_analizy_rynku_gemini.py --profil scalping

      - name: 💾 Zapisz raport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raport-${{ github.run_id }}
          path: Raport_SCALPINGRadar_*.xlsx
          retention-days: 30
