name: 🤖 Quant Radar Bot v4.0

on:
  schedule:
    - cron: '0 8 * * 1-5'    # 09:00 PL
    - cron: '0 12 * * 1-5'   # 13:00 PL
    - cron: '0 16 * * 1-5'   # 17:00 PL
  workflow_dispatch:

jobs:
  analiza:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # v4.0: ~20s zamiast 5min → limit skrócony

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalacja
        run: pip install tradingview_ta pandas openpyxl requests

      - name: 🤖 Uruchom bota
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: scripts/bot_scanner_rynku_claude_4_1.py

      - name: 💾 Zapisz raport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raport-${{ github.run_id }}
          path: Raport_QuantRadar_*.xlsx
          retention-days: 30
